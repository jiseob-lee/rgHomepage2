<script type="text/javascript">
//특수문자, 특정문자열(sql예약어) 제거
function checkSearchedWordNew(obj){
	obj.value = obj.value+" ";
	//특수문자 제거
	if(obj.value.length >0){
		var expText = /[%=><]/ ;
		if(expText.test(obj.value) == true){
			obj.value = obj.value.split(expText).join(""); 
		}
		//체크 문자열
		var sqlArray = new Array( //sql 예약어
			"OR", "SELECT", "INSERT", "DELETE", "UPDATE", "CREATE", "DROP", "EXEC", "UNION",  "FETCH", "DECLARE", "TRUNCATE"
		);
		
		var regex;
		var regex_plus ;
		for(var i=0; i<sqlArray.length; i++){
			regex = new RegExp("\\s" + sqlArray[i] + "\\s","gi") ;
			if (regex.test(obj.value)) {
				obj.value =obj.value.replace(regex, "");
				toast("\"" + sqlArray[i]+"\"와(과) 같은 특정문자로 검색할 수 없습니다.");
			}
			regex_plus = new RegExp( "\\+" + sqlArray[i] + "\\+","gi") ;
			if (regex_plus.test(obj.value)) {
				obj.value =obj.value.replace(regex_plus, "");
				toast("\"" + sqlArray[i]+"\"와(과) 같은 특정문자로 검색할 수 없습니다.");
			}
		}
	}
	return obj.value = obj.value;
}

var prettifyXml = function(sourceXml)
{
    var xmlDoc = new DOMParser().parseFromString(sourceXml, 'application/xml');
    var xsltDoc = new DOMParser().parseFromString([
        // describes how we want to modify the XML - indent everything
        '<xsl:stylesheet xmlns:xsl="http://www.w3.org/1999/XSL/Transform">',
        '  <xsl:strip-space elements="*"/>',
        '  <xsl:template match="para[content-style][not(text())]">', // change to just text() to strip space in text nodes
        '    <xsl:value-of select="normalize-space(.)"/>',
        '  </xsl:template>',
        '  <xsl:template match="node()|@*">',
        '    <xsl:copy><xsl:apply-templates select="node()|@*"/></xsl:copy>',
        '  </xsl:template>',
        '  <xsl:output indent="yes"/>',
        '</xsl:stylesheet>',
    ].join('\n'), 'application/xml');

    var xsltProcessor = new XSLTProcessor();    
    xsltProcessor.importStylesheet(xsltDoc);
    var resultDoc = xsltProcessor.transformToDocument(xmlDoc);
    var resultXml = new XMLSerializer().serializeToString(resultDoc);
    return resultXml;
};

// xml타입 페이지 처리 (주소정보 리스트 makeList(xmlData); 다음에서 호출) 
function pageMake(xmlStr, searchType, callType){
	var total = $(xmlStr).find("totalCount").text(); 	// 총건수
	var pageNum =  $(xmlStr).find("currentPage").text();// 현재페이지
	var paggingStr = "";
	if(total < 1){
		if(searchType == '2' || searchType == '3'){
			initInfoLayer();
			initMarkerLayer("all");
			initToolTip("all");
			$(".tabInfo").hide();
			$("#mapBuldRoadInfo").hide();
			$(".searchInfoMiniTooltop").hide();
			
			toast("검색된 내용이 없습니다.");
		}
	}else{
		var PAGEBLOCK= 5;
		var pageSize= 5;
		var totalPages = Math.floor((total-1)/pageSize) + 1;
		var firstPage = Math.floor((pageNum-1)/PAGEBLOCK) * PAGEBLOCK + 1;		
		if( firstPage <= 0 ) firstPage = 1;		
		var lastPage = firstPage-1 + PAGEBLOCK;
		if( lastPage > totalPages ) lastPage = totalPages;		
		var nextPage = lastPage+1 ;
		var prePage = firstPage-5 ;
		var callUrlFunction = '';
		if(callType == 'roadIntrvl'){
			callUrlFunction = 'searchUrlRoadIntrvl();';
		}else{
			callUrlFunction = 'searchUrlJuso();';
		}
		
		if( firstPage > PAGEBLOCK ){
			paggingStr +=  "<a class='skip prev10' href='javascript: $(\"#currentPage\").val(1); "+callUrlFunction+"'>처음으로</a>  ";
			paggingStr +=  "<a class='skip prev' href='javascript: $(\"#currentPage\").val("+prePage+"); "+callUrlFunction+"'>이전으로</a>  ";
		}
		for( i=firstPage; i<=lastPage; i++ ){
			if( pageNum == i )
				paggingStr += "<strong>" + i + "</strong>  ";
			else
				paggingStr += "<a href='javascript:$(\"#currentPage\").val("+i+"); "+callUrlFunction+"'>" + i + "</a>  ";
		}		
		if( lastPage < totalPages ){
			paggingStr +=  "<a class='skip next' href='javascript: $(\"#currentPage\").val("+nextPage+"); "+callUrlFunction+"'>다음으로</a>";
		}		
		$("#pageApi").html(paggingStr);
		
		if(!$(".totSearch").hasClass("os-host-scrollbar-vertical-hidden")){
			$(".totSearch").overlayScrollbars({ overflowBehavior:{x:"none", y:"scroll"} });
		}
	}
	
	if(searchType == '1' || searchType == '2'){
		if($("#searchWrap").is(":visible")){
			if(!$("#divOcBox").children("img").hasClass("open")){
				$("#divOcBox").children("img").addClass("open");
				$(".searchWrap").addClass("close"); 
				$(".mapAddrWrap").addClass("left");
			}
		}
		$("#keyword").val("");
	}else if(searchType == '3'){
		if($("#searchWrap").is(":visible")){
			$("#divOcBox").children("img").removeClass("open");
			$(".searchWrap").removeClass("close"); 
			$(".mapAddrWrap").removeClass("left");
			
			$("#keyword").focus();
		}
	}
}

function callbackAddrFloor(data, val){
	var floor_arry = [];
	var floor_html = '<option value="">\"층\" 선택</option>';
	var under_floor_arry = [];
	var under_floor_html = '';
	
	if(data.results != undefined){
		detailAddrArry = data.results.juso;
		
		for(var i=0; i < detailAddrArry.length; i++){
			if(detailAddrArry[i].floorNm != '' && detailAddrArry[i].floorNm.indexOf("지하") > -1 && under_floor_arry.indexOf(detailAddrArry[i].floorNm) == -1){
				//지하
				if((val == '' || val == 'none') || (val != '' && detailAddrArry[i].dongNm == val)){
					under_floor_arry.push(detailAddrArry[i].floorNm);
					if(val != '') under_floor_html += '<option value="'+detailAddrArry[i].floorNm+'">' + detailAddrArry[i].floorNm + '</option>';
				}
			}else if(detailAddrArry[i].floorNm.indexOf("지하") == -1 && floor_arry.indexOf(detailAddrArry[i].floorNm) == -1){
				//지상
				if((val == '' || val == 'none') || (val != '' && detailAddrArry[i].dongNm == val)){
					floor_arry.push(detailAddrArry[i].floorNm);
					if(val != '') {
						if(detailAddrArry[i].floorNm != ''){
							floor_html += '<option value="'+detailAddrArry[i].floorNm+'">' + detailAddrArry[i].floorNm + '</option>';
						}else{
							floor_html += '<option value="none">\"층\" 표기 없음</option>';
						}
					}
				}
			}
		}
		
		if(floor_arry.length == 0 && under_floor_arry.length == 0 ) floor_html = '<option value="none">\"층\" 표기 없음</option>';

function getDetailAddrHo(gubun, val){
	var ho_arry = [];
	var ho_html = '<option value="">\"호\" 선택</option>';
	// 층 선택하기전에 선택한 동 정보
	var dong_selected = ($("#detailAddrDong option:selected").val() == "none" ? "" : $("#detailAddrDong option:selected").val());
	var floor_selected = (val == "none" ? "" : val);
	
	for(var i=0; i < detailAddrArry.length; i++){
		if(gubun == 'floor'){
			if(ho_arry.indexOf(detailAddrArry[i].hoNm) == -1){
				if((val == '') || ((val != '' || val == 'none') && detailAddrArry[i].dongNm == dong_selected && detailAddrArry[i].floorNm == floor_selected)){
					ho_arry.push(detailAddrArry[i].hoNm);

						}else{
							ho_html += '<option value="none">\"호\" 표기 없음</option>';
						}
					}
				}
			}
		}else if(gubun == 'dong'){
			if(ho_arry.indexOf(detailAddrArry[i].hoNm) == -1){
				if(val != '' && detailAddrArry[i].dongNm == val){
					ho_arry.push(detailAddrArry[i].hoNm);
					if(val != ''){
						if(detailAddrArry[i].hoNm != ''){
							ho_html += '<option value="'+detailAddrArry[i].hoNm+'">' + detailAddrArry[i].hoNm + '</option>';
						}else{
							ho_html += '<option value="none">\"호\" 표기 없음</option>';
						}
					}
				}
			}
		}
	}
	
	if(ho_arry.length == 0) ho_html = '<option value="none">\"호\" 표기 없음</option>';
	if(val != ''){
		$("select[name='detailAddrHo']").html(ho_html);

	}else if(val == 'none' && ho_arry.length != 0){
		$("select[name='detailAddrHo']").html('<option value="">\"호\" 선택</option>');
	}
	
	$("select[name='detailAddrFloor']").val(val);
	
}

function getDetailAddr(val){

function chkConfmKey(){
	var confmKey='U01TX0FVVEgyMDIzMDcyNjIyMTMzMjExMzk2NTU=';
	var scripts = document.getElementsByTagName('script');
	var myScript;
	var myScriptIndex = -1;
	for(var x=0; x < scripts.length; x++ ){
		if(scripts[x].src.indexOf('jusoro_map_api.min.js?') != -1){
			myScriptIndex = x;
			myScript = scripts[x];
		}
	}
	
	if(myScriptIndex == -1){
		alert('지도API 호출형식이 잘못되었습니다. 활용가이드를 참고하시기 바랍니다.');
		return '';
	}else{
		var frm = document.AKCFrm;
		var param=[];
		var temp = myScript.src.replace(/^[^\?]+\?/, '').replace(/#.+$/, '').split('&');
		var regex = /^[0-9]+$/g;
		
		for(var x=0; x < temp.length; x++){
			var params = temp[x];
			if(typeof params != "undefined"){
				param[0] = params.substr(0, params.indexOf('='));
				param[1] = params.substr(params.indexOf('=')+1);
				if(param[1] == null || param[1] == 'null') param[1]='';
				
				if(param[0] == 'confmKey'){
					confmKey = "U01TX0FVVEgyMDIzMDcyNjIyMTMzMjExMzk2NTU=";
					frm.confmKey.value = "U01TX0FVVEgyMDIzMDcyNjIyMTMzMjExMzk2NTU=";
				}else if(param[0] == 'resultType' && param[1] != ''){
					frm.resultType.value = param[1];
				}else if(param[0] == 'skinType' && param[1] != ''){
					frm.skinType.value = param[1];
				}else if(param[0] == 'countPerPage' && regex.test(param[1])){
					var tempVal = param[1];
					if(tempVal > 20) tempVal = 20;
					if(tempVal < 5) tempVal = 5;
					frm.countPerPage.value = tempVal;
				}
			}
		}
	}
	
	return confmKey;
}

function callbackAddrDong(data){
	if(data.results != undefined){

		$("#detailAddrFloor2").children('option:not(:first)').remove();
		$("#detailAddrHo2").children('option:not(:first)').remove();
	}
}

function popClose(){
	window.close();
}

function ctrlLayerOpen(type, obj){
	if(type == "saveMap"){
		$(".popupWrap."+type).show();
	} else if(type == "legend"){
		if($(".popupWrap.legend").css("display") == "none"){
			$(".popupWrap.legend").show();
			if(typeof obj != "undefined") $(obj).addClass("active");
		} else {
			$(".popupWrap.legend").hide();
			if(typeof obj != "undefined") $(obj).removeClass("active");
		}
	}
}

//복사 버튼 클릭시 토스트 메세지 띄워주는 함수
function toast(string){
	var removeToast;
	var toast = document.getElementById("toast");
	
	(toast.classList.contains('reveal')) ? 
			(clearTimeout(removeToast), removeToast =setTimeout(function () {
				$('#toast').removeClass('reveal')	}, 3000)):
			removeToast = setTimeout(function () {
					$('#toast').removeClass('reveal')	}, 3000)
				toast.classList.add('reveal'),
				toast.innerText = string;
}

function toggleLanguage(language) {
	if(language == 'eng'){
		$('.addrKor').css('display','none');
		$('.addrEng').css('display','');
	}
	else if(language == 'kor'){
		$('.addrKor').css('display','');
		$('.addrEng').css('display','none');	
	}
}
